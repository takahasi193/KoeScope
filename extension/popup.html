<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DL Voice Search</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local backend</p>
        <h1>DL Voice Search</h1>
      </div>
      <span class="status" id="serverStatus">连接中</span>
    </header>

    <main class="shell">
      <details class="settings-card" id="backendSettings">
        <summary>连接设置</summary>
        <div class="backend-row">
          <label>
            <span>本地后端</span>
            <input id="backendBaseInput" type="url" placeholder="http://localhost:5178" />
          </label>
          <button id="saveBackendButton" type="button" class="link-button">保存</button>
        </div>
      </details>

      <section class="panel account-panel">
        <div class="panel-head">
          <h2>DLsite 账号</h2>
          <span id="accountStatus">未连接</span>
        </div>
        <p class="account-copy" id="accountSummary">先在 Chrome 登录 DLsite，再点击同步账号。</p>
        <div class="account-actions">
          <button id="openDlsiteLoginButton" type="button" class="link-button">打开登录</button>
          <button id="syncDlsiteAccountButton" type="button" class="secondary">快速同步</button>
          <button id="deepSyncDlsiteAccountButton" type="button" class="link-button">深度同步</button>
          <button id="openDashboardButton" type="button" class="link-button">仪表盘</button>
        </div>
      </section>

      <section class="panel activity-panel" id="activityReminderPanel">
        <div class="panel-head">
          <h2>DLsite 活动提醒</h2>
          <span id="activityReminderStatus">读取中</span>
        </div>
        <p class="activity-copy" id="activityReminderCopy">正在读取公开活动提醒。</p>
        <div class="activity-reminder-list" id="activityReminderList"></div>
        <div class="activity-actions">
          <button id="openActivityDashboardButton" type="button" class="secondary">查看活动</button>
          <button id="refreshActivityReminderButton" type="button" class="link-button">刷新</button>
        </div>
      </section>

      <section class="query">
        <label>
          <span>声优名或马甲</span>
          <input id="keywordInput" type="search" placeholder="选中文本后右键搜索" autocomplete="off" />
        </label>
        <div class="actions">
          <button id="resolveButton" class="primary" type="button">解析</button>
          <button id="searchButton" class="secondary" type="button" disabled>搜索</button>
        </div>
      </section>

      <section class="settings">
        <label>
          <span>范围</span>
          <select id="scopeInput">
            <option value="all" selected>全部</option>
            <option value="adult">仅 R18</option>
            <option value="nonAdult">全年龄/R15</option>
          </select>
        </label>
        <label>
          <span>排序</span>
          <select id="orderInput">
            <option value="release_d" selected>最新</option>
            <option value="dl_d">贩卖总数</option>
          </select>
        </label>
        <label>
          <span>最多页数</span>
          <input id="pagesInput" type="number" min="1" max="100" value="50" />
        </label>
        <label>
          <span>每页</span>
          <select id="perPageInput">
            <option value="30">30</option>
            <option value="50">50</option>
            <option value="100" selected>100</option>
          </select>
        </label>
        <label class="check muted-check">
          <input id="verifyDetailsInput" type="checkbox" />
          <span>详情验证</span>
        </label>
        <label class="check">
          <input id="adultConfirmInput" type="checkbox" />
          <span>确认合法年龄与地区</span>
        </label>
      </section>

      <section class="panel compact-panel" id="historyPanel" hidden>
        <div class="panel-head">
          <h2>最近搜索</h2>
          <button id="clearHistoryButton" type="button" class="link-button">清空</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>候选人物</h2>
          <span id="candidateCount">0</span>
        </div>
        <div class="candidate-list" id="candidateList"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>别名</h2>
          <span id="aliasCount">0</span>
        </div>
        <div class="alias-tools">
          <button id="selectPenNamesButton" type="button" class="link-button">马甲</button>
          <button id="selectAllAliasesButton" type="button" class="link-button">全选</button>
          <button id="clearAliasesButton" type="button" class="link-button">清空</button>
        </div>
        <div class="alias-list" id="aliasList"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>结果</h2>
          <button id="openFullAppButton" type="button" class="link-button">打开本地页面</button>
        </div>
        <p id="summary" class="summary">先解析人物，再搜索作品。</p>
        <div class="tabs" id="typeTabs"></div>
        <div class="tabs age-tabs" id="ageTabs"></div>
        <div class="result-list" id="resultList"></div>
      </section>
    </main>

    <div class="toast" id="toast" hidden></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
