<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KoeScope</title>
    <link rel="icon" href="/assets/koescope-icon-32.png" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/koescope-icon-256.png" />
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">Search 01 / Bangumi 别名解析</p>
        <h1>KoeScope</h1>
        <p class="top-lead">人物相关作品渐进搜索工作区</p>
      </div>
      <div class="top-actions">
        <a class="top-link" href="/person.html">人物详情</a>
        <a class="top-link" href="/dashboard.html">Monitor 仪表盘</a>
        <button class="theme-toggle" data-theme-toggle type="button" aria-pressed="false">Dark</button>
        <div class="status-pill" id="serverStatus">连接中</div>
      </div>
    </header>

    <main class="shell">
      <section class="workspace" data-section="01 Search">
        <div class="search-row">
          <label class="search-field">
            <span>人物名或别名</span>
            <input id="keywordInput" type="search" placeholder="例如：青山ゆかり" autocomplete="off" />
          </label>
          <button class="primary-action" id="resolveButton" type="button">解析人物</button>
          <button class="secondary-action" id="runButton" type="button" disabled>搜索 DLsite</button>
        </div>

        <div class="settings-row">
          <label>
            <span>默认勾选数</span>
            <input id="maxAliasesInput" type="number" min="1" max="80" value="12" />
          </label>
          <label>
            <span>每个别名最多页数</span>
            <input id="maxPagesInput" type="number" min="1" max="100" value="50" />
          </label>
          <label>
            <span>每页数量</span>
            <select id="perPageInput">
              <option value="30">30</option>
              <option value="50">50</option>
              <option value="100" selected>100</option>
            </select>
          </label>
          <label>
            <span>年龄范围</span>
            <select id="ageScopeInput">
              <option value="all" selected>全部</option>
              <option value="adult">仅 R18</option>
              <option value="nonAdult">全年龄/R15</option>
            </select>
          </label>
          <label class="check-control verify-check">
            <input id="verifyDetailsInput" type="checkbox" />
            <span>详情验证</span>
          </label>
          <label class="legal-check">
            <input id="adultConfirm" type="checkbox" />
            <span>我确认仅在合法年龄与地区使用 R18 搜索</span>
          </label>
        </div>
      </section>

      <section class="layout">
        <aside class="side-panel" data-section="02 Persons">
          <div class="panel-head">
            <h2>候选人物</h2>
            <span id="candidateCount">0</span>
          </div>
          <div class="candidate-list" id="candidateList"></div>
        </aside>

        <section class="main-panel" data-section="03 Works">
          <div class="panel-head">
            <h2>别名</h2>
            <span id="aliasCount">0</span>
          </div>
          <div class="alias-tools">
            <button class="mini-action" id="selectPenNamesButton" type="button">优先马甲</button>
            <button class="mini-action" id="selectAllAliasesButton" type="button">全选</button>
            <button class="mini-action" id="clearAliasesButton" type="button">清空</button>
          </div>
          <div class="alias-grid" id="aliasGrid"></div>

          <div class="result-head">
            <div>
              <h2>结果</h2>
              <p id="resultSummary">先解析人物，再选择别名搜索。</p>
            </div>
            <div class="result-sort" id="orderInput" role="group" aria-label="作品排序" data-order="dl_d">
              <button class="active" data-order="dl_d" type="button">贩卖总数</button>
              <button data-order="release_d" type="button">最新</button>
            </div>
          </div>

          <div class="tabs" id="categoryTabs"></div>
          <div class="tabs age-tabs" id="ageTabs"></div>
          <div class="result-list" id="resultList"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" hidden></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
