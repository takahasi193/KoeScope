<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DLsite Monitor</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <header class="monitor-topbar">
      <div>
        <p class="eyebrow">Local SQLite monitor</p>
        <h1>DLsite Monitor</h1>
      </div>
      <nav class="top-actions" aria-label="页面操作">
        <a class="link-action" href="/">返回 DLVoiceSearch 搜索</a>
        <button class="primary-action" id="syncButton" type="button">同步</button>
        <span class="status-pill" id="syncStatus">读取中</span>
      </nav>
    </header>

    <main class="monitor-shell">
      <section class="metric-strip" aria-label="监测概览">
        <div>
          <span>作品</span>
          <strong id="totalWorks">0</strong>
        </div>
        <div>
          <span>折扣中</span>
          <strong id="discountedWorks">0</strong>
        </div>
        <div>
          <span>关注</span>
          <strong id="watchedWorks">0</strong>
        </div>
        <div>
          <span>未读提醒</span>
          <strong id="unreadAlerts">0</strong>
        </div>
        <div>
          <span>点数</span>
          <strong id="accountPoints">0</strong>
        </div>
      </section>

      <section class="sync-line">
        <span id="lastSyncText">尚未同步。</span>
        <span id="nextSyncText">每日自动同步。</span>
      </section>

      <section class="monitor-layout">
        <section class="ranking-pane">
          <div class="section-head">
            <div>
              <h2>排行榜</h2>
              <p id="rankingCaption">总榜，按最近一次快照显示。</p>
            </div>
            <div class="filters">
              <label>
                <span>分类</span>
                <select id="categoryInput">
                  <option value="all" selected>总榜</option>
                  <option value="voice">ASMR / 音声</option>
                  <option value="game">游戏</option>
                  <option value="manga">漫画</option>
                </select>
              </label>
              <label>
                <span>楼层</span>
                <select id="floorInput">
                  <option value="home">全年龄</option>
                  <option value="maniax">R18</option>
                </select>
              </label>
              <label>
                <span>周期</span>
                <select id="periodInput">
                  <option value="day">日榜</option>
                  <option value="week" selected>周榜</option>
                  <option value="month">月榜</option>
                </select>
              </label>
            </div>
          </div>
          <div class="ranking-table-wrap">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>作品</th>
                  <th>价格</th>
                  <th>趋势</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="rankingBody"></tbody>
            </table>
          </div>
        </section>

        <aside class="side-rail">
          <section class="side-section account-section">
            <div class="section-head compact">
              <h2>DLsite 账号</h2>
              <button class="text-action" id="accountSyncButton" type="button">扩展同步</button>
            </div>
            <div class="account-box">
              <div class="account-state" id="accountState">未连接</div>
              <div class="account-meta" id="accountMeta">在 Chrome 中登录 DLsite 后，通过 DL Voice Search Companion 扩展同步账号。</div>
              <div class="mini-actions">
                <a class="mini-button" href="https://www.dlsite.com/home/regist/user" target="_blank" rel="noreferrer">打开登录</a>
                <button class="mini-button" id="accountClearButton" type="button">断开</button>
              </div>
            </div>
          </section>

          <section class="side-section">
            <div class="section-head compact">
              <h2>点数推荐</h2>
              <span id="recommendationCount">0</span>
            </div>
            <div class="recommendation-list" id="recommendationList"></div>
          </section>

          <section class="side-section">
            <div class="section-head compact">
              <h2>提醒</h2>
              <button class="text-action" id="showAllAlertsButton" type="button">全部</button>
            </div>
            <div class="alert-list" id="alertList"></div>
          </section>

          <section class="side-section">
            <div class="section-head compact">
              <h2>关注</h2>
              <span id="watchCount">0</span>
            </div>
            <div class="watch-list" id="watchList"></div>
          </section>

          <section class="side-section">
            <div class="section-head compact">
              <h2>明显降价</h2>
            </div>
            <div class="drop-list" id="dropList"></div>
          </section>
        </aside>
      </section>

      <aside class="history-panel" id="historyPanel" role="dialog" aria-modal="false" aria-labelledby="historyTitle" hidden>
        <div class="section-head">
          <div>
            <h2 id="historyTitle">历史</h2>
            <p id="historyMeta"></p>
          </div>
          <button class="text-action" id="closeHistoryButton" type="button">关闭</button>
        </div>
        <div class="history-grid">
          <div>
            <h3>价格快照</h3>
            <div class="history-list" id="priceHistory"></div>
          </div>
          <div>
            <h3>排名快照</h3>
            <div class="history-list" id="rankHistory"></div>
          </div>
        </div>
      </aside>
    </main>

    <div class="toast" id="toast" hidden></div>
    <script src="/dashboard.js" type="module"></script>
  </body>
</html>
