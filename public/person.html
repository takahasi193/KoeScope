<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>人物详情 - KoeScope</title>
    <link rel="icon" href="/assets/koescope-icon-32.png" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/koescope-icon-256.png" />
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/person.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">Works 02 / 本地搜索历史</p>
        <h1>人物详情</h1>
        <p class="top-lead">人物资料、别名与作品记录</p>
      </div>
      <div class="top-actions">
        <a class="top-link" href="/">返回搜索</a>
        <a class="top-link" href="/dashboard.html">打开 Monitor</a>
        <button class="theme-toggle" data-theme-toggle type="button" aria-pressed="false">Dark</button>
        <div class="status-pill" id="serverStatus">连接中</div>
      </div>
    </header>

    <main class="shell person-shell">
      <section class="person-workspace" data-section="01 Profile">
        <img id="personImage" class="person-avatar" alt="" />
        <div class="person-title-block">
          <p class="eyebrow" id="dataSource">数据来自本地搜索历史</p>
          <h2 id="personName">加载中</h2>
          <p id="personMeta">正在读取本地保存的搜索结果。</p>
          <div class="person-alias-summary" id="aliasSummary"></div>
        </div>
        <div class="person-lookup">
          <label>
            <span>按名称打开</span>
            <input id="keywordInput" type="search" placeholder="例如：青山ゆかり" autocomplete="off" />
          </label>
          <button class="secondary-action" id="keywordButton" type="button">查找</button>
        </div>
        <section class="person-subscription-box">
          <div>
            <p class="eyebrow">Monitor 04 / Subscription</p>
            <strong id="subscriptionStatus">Not subscribed</strong>
            <p id="subscriptionMeta">保存这个人物，用现有搜索词低频检查 DLsite 可能相关作品。</p>
          </div>
          <div class="mini-actions">
            <button class="mini-button primary" id="subscribeButton" type="button">关注人物</button>
            <button class="mini-button" id="checkSubscriptionButton" type="button" hidden>立即检查</button>
            <button class="mini-button" id="unsubscribeButton" type="button" hidden>取消关注</button>
          </div>
        </section>

        <section class="person-moegirl-box" aria-labelledby="moegirlStatus">
          <div class="person-moegirl-head">
            <p class="eyebrow">Moegirl 05 / Profile</p>
            <strong id="moegirlStatus">萌娘百科资料暂未匹配</strong>
            <a id="moegirlSource" class="mini-link" href="https://zh.moegirl.org.cn/" target="_blank" rel="noreferrer" hidden>来源</a>
          </div>
          <p id="moegirlSummary">加载人物后会尝试读取萌娘百科公开资料。</p>
          <div class="moegirl-work-list" id="moegirlWorks"></div>
        </section>
      </section>

      <section class="person-layout">
        <aside class="person-side">
          <section class="side-panel" data-section="02 Alias">
            <div class="panel-head">
              <h2>别名</h2>
              <span id="aliasCount">0</span>
            </div>
            <div class="alias-grid person-alias-list" id="aliasList"></div>
          </section>

          <section class="side-panel" data-section="03 Timeline">
            <div class="panel-head">
              <h2>最近搜索</h2>
              <span id="searchCount">0</span>
            </div>
            <div class="recent-list" id="recentList"></div>
          </section>
        </aside>

        <section class="main-panel person-main" data-section="04 Works">
          <div class="stats-grid" id="statsGrid"></div>

          <div class="result-head person-result-head">
            <div>
              <h2>作品库</h2>
              <p id="workSummary">数据来自本地搜索历史，可切换最近搜索作为数据来源。</p>
            </div>
            <div class="result-sort" id="sortInput" role="group" aria-label="作品排序">
              <button class="active" data-person-sort="hot" type="button">热门作品</button>
              <button data-person-sort="latest" type="button">最新搜索</button>
            </div>
          </div>

          <div class="person-filters">
            <label>
              <span>类型</span>
              <select id="typeInput">
                <option value="all">全部类型</option>
                <option value="voice">音声/ASMR</option>
                <option value="game">游戏</option>
                <option value="manga">漫画</option>
              </select>
            </label>
            <label>
              <span>年龄</span>
              <select id="ageInput">
                <option value="all">全部年龄</option>
                <option value="r18">R18</option>
                <option value="general">全年龄</option>
                <option value="r15">R15</option>
                <option value="unknown">未知</option>
              </select>
            </label>
            <div class="source-state">
              <span id="activeSource">当前来源：全部本地搜索历史</span>
              <button class="mini-action" id="clearSessionButton" type="button" hidden>使用全部历史</button>
            </div>
          </div>

          <div class="result-list person-work-list" id="workList"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    <script src="/person.js" type="module"></script>
  </body>
</html>
